<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato</title>
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="./contato.css">
    <link rel="icon" href="../assets/logo-etmsl.jpg">
</head>

<body>
    <header>
        <div class="header-container">
            <div class="nav-marca">
                <img class="logo" src="../assets/logo-etmsl.png" alt="">
                <span class="header-titulo-desktop"> Escola Técnica Municipal de Sete Lagoas</span> <!-- Desktop -->
                <span class="header-titulo-mobile">ETMSL</span> <!-- Mobile -->
            </div>
            <nav>
                <button class="btn-menu-mobile"><img class="nav-icon-mobile" src="../assets/burguer-menu.svg" alt=""></button> <!-- Mobile -->
                <ul class="nav-list">
                    <li><a class="nav-item" href="../index.html">Home</a></li>
                    <li><a class="nav-item" href="../professor/professor.html">Professor</a></li>
                    <li><a class="nav-item" href="./contato.html">Contato</a></li>
                    <li><a class="nav-item-strong" href="https://etmsl.setelagoas.mg.gov.br/home.php" target="_blank">Página Oficial</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h1 class="contato-title">Entre em Contato</h1>

        <div class="contato-container">
            <div class="decorativo-azul">
                <img src="../assets/detalhe-branco.svg" alt="Detalhe Branco">
            </div>

            <form class="contato-form" action="">
                <div class="form-item">
                    <p>Nome completo *</p>
                    <input id="input-nome" class="form-input" type="text" oninput="resetarEstilosInput(this)">
                </div>
                <div class="form-item">
                    <p>E-mail *</p>
                    <input id="input-email" class="form-input" type="email" oninput="resetarEstilosInput(this)">
                </div>
                <div class="form-item-select">

                    <div class="select-item">
                        <label>Cidade</label>
                        <select class="form-input-select" name="cidade" id="cidade-select">
                            <option value=""></option>
                            <option value="Sete Lagoas">Sete Lagoas</option>
                            <option value="Belo Horizonte">Belo Horizonte</option>
                            <option value="Prudente de Morais">Prudente de Morais</option>
                            <option value="Inhaúma">Inhaúma</option>
                        </select>
                    </div>

                    <div class="select-item">
                        <label>Estado</label>
                        <select class="form-input-select" name="estado" id="estado-select">
                            <option value=""></option>
                            <option value="Minas Gerais">MG</option>
                            <option value="Espírito Santo">ES</option>
                            <option value="São Paulo">SP</option>
                            <option value="Rio de Janeiro">RJ</option>
                        </select>
                    </div>

                </div>

                <div class="form-item" id="form-item-idade">
                    <p>Idade</p>
                    <input class="form-input" type="number">
                </div>
                <div class="form-item-radio">
                    <p>Sexo *</p>
                    <div class="item-radio-option">
                        <input oninput=resetarEstilosInput(this) type="radio" id="masculino" name="genero" value="m">
                        <label for="masculino">Masculino</label>
                    </div>
                    <div class="item-radio-option">
                        <input oninput=resetarEstilosInput(this) type="radio" id="feminino" name="genero" value="f">
                        <label for="feminino">Feminino</label>
                    </div>
                </div>

                <button class="form-button">
                    ENVIAR
                </button>
            </form>

        </div>

    </main>

    <footer>
        <div class="footer-container">
            <span>Deixa uma ⭐ no</span>
            <a href="https://github.com/ETMSL/projeto_dev_web_I" target="_blank">GitHub</a>
            <span>| Design no</span>
            <a href="https://www.figma.com/design/noDbiN35r8ThN3CGpPAqs5/P%C3%A1g.-Professor-Prot%C3%B3tipo?node-id=0-1&t=zfFaSwaAmN1Dz6Si-1" target="_blank">Figma ❤️</a>
        </div>
    </footer>

    <script src="../scripts/header.js"></script>
    <script src="../scripts/form_validacoes.js"></script>

</body>

</html>
