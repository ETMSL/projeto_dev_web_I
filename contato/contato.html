<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato</title>
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="./contato.css">
    <link rel="icon" href="../assets/logo-etmsl.jpg">
</head>

<body>
    <header>
        <div class="header-container">
            <div class="nav-marca">
                <img class="logo" src="../assets/logo-etmsl.png" alt="">
                <span class="header-titulo-desktop"> Escola Técnica Municipal de Sete Lagoas</span> <!-- Desktop -->
                <span class="header-titulo-mobile">ETMSL</span> <!-- Mobile -->
            </div>
            <nav>
                <button class="btn-menu-mobile"><img class="nav-icon-mobile" src="../assets/burguer-menu.svg" alt=""></button> <!-- Mobile -->
                <ul class="nav-list">
                    <li><a class="nav-item" href="../index.html">Home</a></li>
                    <li><a class="nav-item" href="../professor/professor.html">Professor</a></li>
                    <li><a class="nav-item" href="./contato.html">Contato</a></li>
                    <li><a class="nav-item-strong" href="https://etmsl.setelagoas.mg.gov.br/home.php" target="_blank">Página Oficial</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h1 class="contato-title">Entre em Contato</h1>

        <div class="contato-container">
            <div class="decorativo-azul">
                <img src="../assets/detalhe-branco.svg" alt="Detalhe Branco">
            </div>

            <form class="contato-form" action="">
                <div class="form-item">
                    <p>Nome completo *</p>
                    <input class="form-input" type="text">
                </div>
                <div class="form-item">
                    <p>E-mail *</p>
                    <input class="form-input" type="text">
                </div>
                <div class="form-item-select">
                    <label>Cidade</label>
                    <select class="form-input-select" name="cidade" id="cidade-select">
                        <option value="Sete Lagoas">Sete Lagoas</option>
                        <option value="Belo Horizonte">Belo Horizonte</option>
                        <option value="Prudente de Morais" selected>Prudente de Morais</option>
                        <option value="Inhaúma">Inhaúma</option>
                    </select>

                    <label>Estado</label>
                    <select class="form-input-select" name="cidade" id="cidade-select">
                        <option value="Minas Gerais">MG</option>
                        <option value="Espírito Santo">ES</option>
                        <option value="São Paulo" selected>SP</option>
                        <option value="Rio de Janeiro">RJ</option>
                    </select>
                </div>

                <div class="form-item">
                    <p>Idade</p>
                    <input class="form-input" type="number">
                </div>
                <div class="form-item-radio">
                    <p>Sexo *</p>
                    <div class="item-radio-option">
                        <input type="radio" id="masculino" name="genero" value="m">
                        <label for="masculino">Masculino</label>
                    </div>
                    <div class="item-radio-option">
                        <input type="radio" id="feminino" name="genero" value="f">
                        <label for="feminino">Feminino</label>
                    </div>
                </div>

                <button class="form-button">
                    ENVIAR
                </button>
            </form>

        </div>

    </main>

    <footer>
        <div class="footer-container">
            <span>© 2026 ETMSL. Projeto disponível no </span>
            <a href="https://github.com/ETMSL/projeto_dev_web_I" target="_blank">GitHub</a>
        </div>
    </footer>

    <script>
        const btnMobile = document.querySelector('.btn-menu-mobile');
        const navList = document.querySelector('.nav-list');

        btnMobile.addEventListener('click', () => {
            navList.classList.toggle('active');
        });
    </script>

</body>

</html>
